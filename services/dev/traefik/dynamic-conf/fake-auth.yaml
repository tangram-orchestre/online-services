http:
  middlewares:
    fake-auth:
      forwardAuth:
        address: "http://fake-auth:3000/"
        trustForwardHeader: true
        authResponseHeaders:
          # App headers for portal
          - X-App-User
          - X-App-Email
          - X-App-Groups
          - X-App-LastName
          - X-App-FirstName
          - X-App-PhoneNumber
