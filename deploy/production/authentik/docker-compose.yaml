services:
  authentik-server:
    image: ghcr.io/goauthentik/server:2026.2.4
    restart: unless-stopped
    command: server
    environment:
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
      AUTHENTIK_WEB__WORKERS: 1
      # AUTHENTIK_LOG_LEVEL: trace
    deploy:
      resources:
        limits:
          cpus: 1
    labels:
      - traefik.enable=true
      - traefik.http.services.authentik.loadbalancer.server.port=9000
      - traefik.http.routers.authentik.rule=Host(`auth.tangram-orchestre.fr`)
      - traefik.http.routers.authentik.tls=true
      - traefik.http.routers.authentik.tls.certresolver=resolver
    volumes:
      - /opt/docker-volumes/authentik/data:/data
      - /opt/docker-volumes/authentik/custom-templates:/templates
    env_file:
      - .env
    depends_on:
      - authentik-postgresql

  authentik-worker:
    image: ghcr.io/goauthentik/server:2026.2.4
    restart: unless-stopped
    command: worker
    environment:
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
      AUTHENTIK_WORKER__THREADS: 1
    deploy:
      resources:
        limits:
          cpus: 1

    volumes:
      - /run/user/${UID}/docker.sock:/var/run/docker.sock
      - /opt/docker-volumes/authentik/data:/data
      - /opt/docker-volumes/authentik/certs:/certs
      - /opt/docker-volumes/authentik/custom-templates:/templates
    env_file:
      - .env
    depends_on:
      - authentik-postgresql

  authentik-postgresql:
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 5s
    volumes:
      - /opt/docker-volumes/authentik/db:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${PG_PASS}
      POSTGRES_USER: authentik
      POSTGRES_DB: authentik
    env_file:
      - .env

  authentik-postgres-backup:
    image: docker.io/library/postgres:17.4-alpine
    restart: unless-stopped
    depends_on:
      authentik-postgresql:
        condition: service_healthy
    volumes:
      - /opt/db-backups/authentik-db:/opt/db-backups
      - ./postgres-backup-crontab:/etc/crontabs/root:ro
    environment:
      PGPASSWORD: ${PG_PASS}
      PGUSER: authentik
      PGDATABASE: authentik
      PGHOST: authentik-postgresql
    command: crond -f -l 8
